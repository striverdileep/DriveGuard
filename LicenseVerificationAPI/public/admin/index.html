<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>License Admin Portal</title>
    <!-- Material-UI CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@mui/material@5.14.0/dist/mui.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      #root {
        width: 100%;
        max-width: 800px;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 40px 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 2em;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .header p {
        font-size: 1em;
        opacity: 0.9;
      }

      .form-container {
        padding: 40px;
      }

      .form-group {
        margin-bottom: 24px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
        font-size: 0.95em;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 0.95em;
        font-family: "Roboto", sans-serif;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 600px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      .image-upload-area {
        border: 2px dashed #667eea;
        border-radius: 8px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #f8f9ff;
      }

      .image-upload-area:hover {
        border-color: #764ba2;
        background: #f0f1ff;
      }

      .image-upload-area.dragover {
        border-color: #667eea;
        background: #e8eaff;
        transform: scale(1.02);
      }

      .image-upload-area input[type="file"] {
        display: none;
      }

      .upload-icon {
        font-size: 3em;
        color: #667eea;
        margin-bottom: 10px;
      }

      .upload-text {
        color: #666;
        margin-bottom: 5px;
      }

      .upload-hint {
        font-size: 0.85em;
        color: #999;
      }

      .image-preview {
        margin-top: 15px;
        text-align: center;
      }

      .image-preview img {
        max-width: 150px;
        max-height: 150px;
        border-radius: 8px;
        border: 2px solid #667eea;
        padding: 5px;
      }

      .image-info {
        margin-top: 10px;
        font-size: 0.9em;
        color: #667eea;
      }

      .button-group {
        display: flex;
        gap: 12px;
        margin-top: 30px;
      }

      .btn {
        flex: 1;
        padding: 14px 24px;
        border: none;
        border-radius: 6px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-submit:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .btn-reset {
        background: #f0f0f0;
        color: #333;
      }

      .btn-reset:hover {
        background: #e0e0e0;
      }

      .alert {
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 24px;
        display: none;
        animation: slideIn 0.3s ease;
      }

      .alert.show {
        display: block;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .alert-info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }

      .alert-close {
        float: right;
        cursor: pointer;
        font-size: 1.2em;
        line-height: 1;
      }

      @keyframes slideIn {
        from {
          transform: translateY(-20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .success-message {
        text-align: center;
        padding: 20px;
      }

      .success-icon {
        font-size: 4em;
        color: #28a745;
        margin-bottom: 15px;
      }

      .success-message h2 {
        color: #28a745;
        margin-bottom: 10px;
      }

      .success-message p {
        color: #666;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React and ReactDOM CDN -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <!-- Material-UI Components -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState } = React;

      function LicenseAdminForm() {
        const [formData, setFormData] = useState({
          LicenseNumber: "",
          Name: "",
          DOB: "",
          ExpiryDate: "",
        });

        const [selectedFile, setSelectedFile] = useState(null);
        const [fileName, setFileName] = useState("");
        const [filePreview, setFilePreview] = useState(null);
        const [loading, setLoading] = useState(false);
        const [alert, setAlert] = useState({
          show: false,
          type: "info",
          message: "",
        });
        const [successData, setSuccessData] = useState(null);

        const handleInputChange = (e) => {
          const { name, value } = e.target;
          setFormData((prev) => ({
            ...prev,
            [name]: value,
          }));
        };

        const handleFileSelect = (file) => {
          if (file) {
            const validMimes = [
              "image/jpeg",
              "image/png",
              "image/gif",
              "image/webp",
            ];
            if (validMimes.includes(file.type)) {
              setSelectedFile(file);
              setFileName(file.name);

              // Create preview
              const reader = new FileReader();
              reader.onload = (e) => {
                setFilePreview(e.target.result);
              };
              reader.readAsDataURL(file);

              showAlert("success", `Image selected: ${file.name}`);
            } else {
              showAlert(
                "error",
                "Invalid file type. Please select JPEG, PNG, GIF, or WebP image.",
              );
            }
          }
        };

        const handleDragOver = (e) => {
          e.preventDefault();
          e.currentTarget.classList.add("dragover");
        };

        const handleDragLeave = (e) => {
          e.currentTarget.classList.remove("dragover");
        };

        const handleDrop = (e) => {
          e.preventDefault();
          e.currentTarget.classList.remove("dragover");
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            handleFileSelect(files[0]);
          }
        };

        const showAlert = (type, message) => {
          setAlert({ show: true, type, message });
          setTimeout(() => {
            setAlert({ show: false, type: "info", message: "" });
          }, 5000);
        };

        const formatDateToDD_MM_YYYY = (dateString) => {
          const date = new Date(dateString);
          const day = String(date.getDate()).padStart(2, "0");
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const year = date.getFullYear();
          return `${day}/${month}/${year}`;
        };

        const validateForm = () => {
          if (!formData.LicenseNumber.trim()) {
            showAlert("error", "License Number is required");
            return false;
          }
          if (!formData.Name.trim()) {
            showAlert("error", "Name is required");
            return false;
          }
          if (!formData.DOB.trim()) {
            showAlert("error", "Date of Birth is required");
            return false;
          }
          if (!formData.ExpiryDate.trim()) {
            showAlert("error", "Expiry Date is required");
            return false;
          }
          if (!selectedFile) {
            showAlert("error", "Please select a photo");
            return false;
          }
          return true;
        };

        const handleSubmit = async (e) => {
          e.preventDefault();

          if (!validateForm()) {
            return;
          }

          setLoading(true);

          try {
            const formDataToSend = new FormData();
            formDataToSend.append(
              "LicenseNumber",
              formData.LicenseNumber.trim(),
            );
            formDataToSend.append("Name", formData.Name.trim());
            formDataToSend.append("DOB", formData.DOB.trim());
            formDataToSend.append(
              "ExpiryDate",
              formatDateToDD_MM_YYYY(formData.ExpiryDate),
            );
            formDataToSend.append("PhotoImage", selectedFile);

            const response = await fetch("/admin/upload", {
              method: "POST",
              body: formDataToSend,
            });

            const data = await response.json();

            if (response.ok) {
              setSuccessData(data);
              setFormData({
                LicenseNumber: "",
                Name: "",
                DOB: "",
                ExpiryDate: "",
              });
              setSelectedFile(null);
              setFileName("");
              setFilePreview(null);
              showAlert("success", data.message);

              // Reset success screen after 3 seconds
              setTimeout(() => {
                setSuccessData(null);
              }, 5000);
            } else {
              showAlert("error", data.message || "Failed to upload license");
            }
          } catch (error) {
            showAlert("error", `Error: ${error.message}`);
          } finally {
            setLoading(false);
          }
        };

        const handleReset = () => {
          setFormData({
            LicenseNumber: "",
            Name: "",
            DOB: "",
            ExpiryDate: "",
          });
          setSelectedFile(null);
          setFileName("");
          setFilePreview(null);
        };

        if (successData) {
          return (
            <div className="container">
              <div className="header">
                <h1>Upload Success</h1>
              </div>
              <div className="form-container">
                <div className="success-message">
                  <div className="success-icon">
                    <i className="fas fa-check-circle"></i>
                  </div>
                  <h2>License Added Successfully!</h2>
                  <p>{successData.message}</p>
                  <div
                    style={{
                      background: "#f0f0f0",
                      padding: "20px",
                      borderRadius: "8px",
                      marginBottom: "20px",
                      textAlign: "left",
                    }}
                  >
                    <p>
                      <strong>License Number:</strong>{" "}
                      {successData.data.LicenseNumber}
                    </p>
                    <p>
                      <strong>Name:</strong> {successData.data.Name}
                    </p>
                    <p>
                      <strong>DOB:</strong> {successData.data.DOB}
                    </p>
                    <p>
                      <strong>Expiry Date:</strong>{" "}
                      {successData.data.ExpiryDate}
                    </p>
                    <p>
                      <strong>Image Size:</strong>{" "}
                      {(successData.data.imageSize / 1024).toFixed(2)} KB
                    </p>
                  </div>
                  <button
                    className="btn btn-submit"
                    onClick={() => setSuccessData(null)}
                    style={{ marginRight: "10px" }}
                  >
                    Add Another License
                  </button>
                  <a
                    href="/"
                    className="btn btn-reset"
                    style={{ textDecoration: "none" }}
                  >
                    Back to Home
                  </a>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="container">
            <div className="header">
              <h1>
                <i className="fas fa-id-card"></i> License Admin Portal
              </h1>
              <p>Upload and manage driver's licenses</p>
            </div>

            <div className="form-container">
              {alert.show && (
                <div className={`alert alert-${alert.type}`}>
                  <span
                    className="alert-close"
                    onClick={() =>
                      setAlert({ show: false, type: "info", message: "" })
                    }
                  >
                    ×
                  </span>
                  {alert.message}
                </div>
              )}

              <form onSubmit={handleSubmit}>
                <div className="form-row">
                  <div className="form-group">
                    <label htmlFor="license-number">License Number *</label>
                    <input
                      type="text"
                      id="license-number"
                      name="LicenseNumber"
                      value={formData.LicenseNumber}
                      onChange={handleInputChange}
                      placeholder="e.g., DL-2024-123456"
                      disabled={loading}
                    />
                  </div>

                  <div className="form-group">
                    <label htmlFor="name">Full Name *</label>
                    <input
                      type="text"
                      id="name"
                      name="Name"
                      value={formData.Name}
                      onChange={handleInputChange}
                      placeholder="e.g., John Doe"
                      disabled={loading}
                    />
                  </div>
                </div>

                <div className="form-row">
                  <div className="form-group">
                    <label htmlFor="dob">Date of Birth *</label>
                    <input
                      type="date"
                      id="dob"
                      name="DOB"
                      value={formData.DOB}
                      onChange={handleInputChange}
                      disabled={loading}
                    />
                  </div>

                  <div className="form-group">
                    <label htmlFor="expiry">Expiry Date *</label>
                    <input
                      type="date"
                      id="expiry"
                      name="ExpiryDate"
                      value={formData.ExpiryDate}
                      onChange={handleInputChange}
                      disabled={loading}
                    />
                  </div>
                </div>

                <div className="form-group">
                  <label>Photo/Image *</label>
                  <div
                    className="image-upload-area"
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    onClick={() =>
                      document.getElementById("file-input").click()
                    }
                    style={{
                      opacity: loading ? 0.6 : 1,
                      cursor: loading ? "not-allowed" : "pointer",
                    }}
                  >
                    <input
                      type="file"
                      id="file-input"
                      accept="image/*"
                      onChange={(e) => {
                        if (e.target.files && e.target.files[0]) {
                          handleFileSelect(e.target.files[0]);
                        }
                      }}
                      disabled={loading}
                    />
                    <div className="upload-icon">
                      <i className="fas fa-cloud-upload-alt"></i>
                    </div>
                    <div className="upload-text">
                      Click to upload or drag and drop
                    </div>
                    <div className="upload-hint">
                      PNG, JPG, GIF, WebP (Max 10MB)
                    </div>
                  </div>

                  {filePreview && (
                    <div className="image-preview">
                      <img src={filePreview} alt="Preview" />
                      <div className="image-info">
                        <i className="fas fa-check-circle"></i> {fileName}
                      </div>
                    </div>
                  )}
                </div>

                <div className="button-group">
                  <button
                    type="submit"
                    className="btn btn-submit"
                    disabled={loading}
                  >
                    {loading ? (
                      <>
                        <span className="loading"></span> Uploading...
                      </>
                    ) : (
                      <>
                        <i className="fas fa-upload"></i> Submit License
                      </>
                    )}
                  </button>
                  <button
                    type="button"
                    className="btn btn-reset"
                    onClick={handleReset}
                    disabled={loading}
                  >
                    <i className="fas fa-redo"></i> Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      ReactDOM.render(<LicenseAdminForm />, document.getElementById("root"));
    </script>
  </body>
</html>
